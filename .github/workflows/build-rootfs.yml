name: Build rootfs tarball

on:
  push:
    tags:
      - 'rootfs-*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag for rootfs assets'
        required: true
        default: 'rootfs-minbase-systemd'
      variant:
        description: 'mmdebstrap variant'
        required: true
        default: 'minbase'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            suite: trixie
            mirror: http://deb.debian.org/debian
            components: main,contrib,non-free
          - distro: ubuntu
            suite: resolute
            mirror: http://ports.ubuntu.com/ubuntu-ports
            components: main,restricted,universe,multiverse
    env:
      ARCH: arm64
      VARIANT: ${{ github.event.inputs.variant || 'minbase' }}
      ROOTFS_PROFILE: minbase-systemd
      INCLUDE_PACKAGES: apt,ca-certificates,file,systemd,systemd-sysv,udev,kmod,dbus,libpam-systemd,openssh-server,iproute2,iputils-ping
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mmdebstrap zstd debian-archive-keyring ubuntu-keyring jq

      - name: Build rootfs with mmdebstrap
        id: build
        run: |
          BASENAME="${{ matrix.distro }}-${{ matrix.suite }}-${ROOTFS_PROFILE}-${ARCH}"
          TARFILE="${BASENAME}.tar"
          echo "Building ${{ matrix.distro }} ${{ matrix.suite }} (${VARIANT}/${ROOTFS_PROFILE}) for ${ARCH}..."
          sudo mmdebstrap \
            --variant="${VARIANT}" \
            --architecture="${ARCH}" \
            --components="${{ matrix.components }}" \
            --include="${INCLUDE_PACKAGES}" \
            "${{ matrix.suite }}" \
            "${TARFILE}" \
            "${{ matrix.mirror }}"
          echo "tarfile=${TARFILE}" >> "$GITHUB_OUTPUT"
          echo "basename=${BASENAME}" >> "$GITHUB_OUTPUT"

      - name: Extract package manifest
        id: manifest
        run: |
          TARFILE="${{ steps.build.outputs.tarfile }}"
          MANIFEST="${{ steps.build.outputs.basename }}-manifest.txt"
          tar xf "${TARFILE}" ./var/lib/dpkg/status -O | \
            awk '/^Package:/{pkg=$2} /^Version:/{ver=$2; print pkg "\t" ver}' | \
            sort > "${MANIFEST}"
          COUNT=$(wc -l < "${MANIFEST}")
          echo "manifest=${MANIFEST}" >> "$GITHUB_OUTPUT"
          echo "::notice title=${{ matrix.distro }} package count::Installed ${COUNT} packages"
          echo "### ${{ matrix.distro }} ${{ matrix.suite }} installed packages (${COUNT})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -40 "${MANIFEST}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Compress tarball with zstd
        id: compress
        run: |
          TARFILE="${{ steps.build.outputs.tarfile }}"
          ZSTFILE="${TARFILE}.zst"
          zstd -T0 -1 -f "${TARFILE}" -o "${ZSTFILE}"
          rm -f "${TARFILE}"
          echo "zstfile=${ZSTFILE}" >> "$GITHUB_OUTPUT"
          ls -lh "${ZSTFILE}"

      - name: Generate SHA256 checksum
        run: |
          sha256sum "${{ steps.compress.outputs.zstfile }}" > "${{ steps.compress.outputs.zstfile }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.distro }}-${{ matrix.suite }}-rootfs
          path: |
            ${{ steps.compress.outputs.zstfile }}
            ${{ steps.compress.outputs.zstfile }}.sha256
            ${{ steps.manifest.outputs.manifest }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -lh *

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Rootfs ${{ steps.tag.outputs.tag }}
          files: |
            *.tar.zst
            *.tar.zst.sha256
            *-manifest.txt
          generate_release_notes: true
          body: |
            Rootfs tarballs for HK1 Box image builder.

            Profile: `minbase-systemd`

            Includes:
            `apt, ca-certificates, file, systemd, systemd-sysv, udev, kmod, dbus, libpam-systemd, openssh-server, iproute2, iputils-ping`
