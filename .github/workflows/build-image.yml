name: Build HK1 Box bootable image

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 0 15 * *'
  workflow_dispatch:
    inputs:
      tarball_tag:
        description: 'rootfs release tag in this repo (default: latest rootfs-*)'
        required: false
        default: 'latest'

env:
  TARBALL_REPO: ${{ github.repository }}
  KERNEL_REPO: ophub/kernel
  KERNEL_TAGS: kernel_stable
  UBOOT_REPO: ophub/u-boot
  BOARD: s905x3-hk1
  FDTFILE: meson-sm1-hk1box-vontar-x3.dtb
  UBOOT_OVERLOAD: u-boot-x96maxplus.bin
  MAINLINE_UBOOT: hk1box-u-boot.bin.sd.bin
  ROOTFS_VARIANT: minbase-systemd

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: debian
            suite: trixie
          - distro: ubuntu
            suite: resolute
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zstd parted dosfstools e2fsprogs uuid-runtime curl jq \
            pigz git kmod

      - name: Query and download kernel packages
        id: kernel
        run: |
          echo "Querying kernel_stable release from ${KERNEL_REPO}..."
          KERNEL_API="https://api.github.com/repos/${KERNEL_REPO}/releases/tags/${KERNEL_TAGS}"
          curl -fsSL "$KERNEL_API" -o /tmp/kernel_release.json

          # kernel_stable release 的 asset 是 {version}.tar.gz（大包），里面包含 4 个子包
          LATEST_VERSION="$(jq -r '.assets[].name' /tmp/kernel_release.json | grep -v '^deb-' | grep '\.tar\.gz$' | sed 's/\.tar\.gz$//' | sort -V | tail -1)"
          [[ -z "$LATEST_VERSION" ]] && echo "error: No kernel tar.gz found in ${KERNEL_TAGS}" && exit 1
          echo "Found kernel version: ${LATEST_VERSION}"
          echo "version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"

          # 下载大包
          KERNEL_TAR_URL="https://github.com/${KERNEL_REPO}/releases/download/${KERNEL_TAGS}/${LATEST_VERSION}.tar.gz"
          echo "Downloading ${LATEST_VERSION}.tar.gz..."
          curl -fsSL "$KERNEL_TAR_URL" -o "/tmp/${LATEST_VERSION}.tar.gz"

          # 解压得到 boot/dtb/modules/header 四个子包
          mkdir -p /tmp/kernel_extracted
          tar -mxzf "/tmp/${LATEST_VERSION}.tar.gz" -C /tmp/kernel_extracted
          echo "Extracted kernel files:"
          ls -lh /tmp/kernel_extracted/

          # sha256sums 校验（如果存在）
          if [[ -f /tmp/kernel_extracted/sha256sums ]]; then
            cd /tmp/kernel_extracted && sha256sum -c sha256sums --ignore-missing 2>/dev/null || true
          fi

      - name: Query and download mmdebstrap tarball
        id: tarball
        run: |
          TARBALL_TAG="${{ github.event.inputs.tarball_tag || 'latest' }}"
          if [[ "$TARBALL_TAG" == 'latest' ]]; then
            # Pick the newest rootfs-* release from this repository, not the newest image release.
            TARBALL_TAG="$(curl -fsSL "https://api.github.com/repos/${TARBALL_REPO}/releases?per_page=100" | jq -r '[.[] | select(.tag_name | startswith("rootfs-"))][0].tag_name')"
          fi
          [[ -n "$TARBALL_TAG" && "$TARBALL_TAG" != "null" ]] || { echo "error: no rootfs-* release found"; exit 1; }
          echo "Using tarball release: ${TARBALL_TAG}"
          echo "tag=${TARBALL_TAG}" >> "$GITHUB_OUTPUT"

          TARBALL_FILE="${{ matrix.distro }}-${{ matrix.suite }}-${ROOTFS_VARIANT}-arm64.tar.zst"
          TARBALL_URL="https://github.com/${TARBALL_REPO}/releases/download/${TARBALL_TAG}/${TARBALL_FILE}"
          echo "Downloading ${TARBALL_URL}..."
          curl -fsSL "$TARBALL_URL" -o "/tmp/${TARBALL_FILE}"

          # 同时下载 manifest（可选，用于日志参考）
          MANIFEST_FILE="${{ matrix.distro }}-${{ matrix.suite }}-${ROOTFS_VARIANT}-arm64-manifest.txt"
          curl -fsSL "https://github.com/${TARBALL_REPO}/releases/download/${TARBALL_TAG}/${MANIFEST_FILE}" \
            -o "/tmp/${MANIFEST_FILE}" 2>/dev/null || true

          ls -lh "/tmp/${TARBALL_FILE}"

      - name: Download u-boot files
        run: |
          echo "Cloning u-boot repo..."
          git clone --depth 1 "https://github.com/${UBOOT_REPO}.git" /tmp/u-boot-repo

          UBOOT_MBR_SRC="/tmp/u-boot-repo/u-boot/amlogic/bootloader/${MAINLINE_UBOOT}"
          UBOOT_EXT_SRC="/tmp/u-boot-repo/u-boot/amlogic/overload/${UBOOT_OVERLOAD}"

          [[ -f "$UBOOT_MBR_SRC" ]] || { echo "error: ${UBOOT_MBR_SRC} not found"; exit 1; }
          [[ -f "$UBOOT_EXT_SRC" ]] || { echo "error: ${UBOOT_EXT_SRC} not found"; exit 1; }

          cp -f "$UBOOT_MBR_SRC" /tmp/uboot-mbr.bin
          cp -f "$UBOOT_EXT_SRC" /tmp/uboot-ext.bin
          ls -lh /tmp/uboot-*.bin

      - name: Build HK1 Box image
        id: build
        run: |
          KERNEL_VER="${{ steps.kernel.outputs.version }}"
          KERNEL_DIR="/tmp/kernel_extracted/${KERNEL_VER}"
          sudo ./build-image.sh \
            --tarball "/tmp/${{ matrix.distro }}-${{ matrix.suite }}-${ROOTFS_VARIANT}-arm64.tar.zst" \
            --kernel-boot "${KERNEL_DIR}/boot-${KERNEL_VER}-ophub.tar.gz" \
            --kernel-dtb "${KERNEL_DIR}/dtb-amlogic-${KERNEL_VER}-ophub.tar.gz" \
            --kernel-modules "${KERNEL_DIR}/modules-${KERNEL_VER}-ophub.tar.gz" \
            --uboot-mbr /tmp/uboot-mbr.bin \
            --uboot-ext /tmp/uboot-ext.bin \
            --distro "${{ matrix.distro }}" \
            --suite "${{ matrix.suite }}" \
            --output "${{ matrix.distro }}-${{ matrix.suite }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.distro }}-${{ matrix.suite }}-image
          path: |
            ${{ matrix.distro }}-${{ matrix.suite }}_*.img.gz
            ${{ matrix.distro }}-${{ matrix.suite }}_*.img.gz.sha256
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -lh *.img.gz *.sha256 2>/dev/null || true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.img.gz
            *.sha256
          name: "HK1 Box Image ${{ github.ref_name || github.run_id }}"
          tag_name: ${{ github.ref_name || format('build-{0}', github.run_id) }}
          generate_release_notes: true
          body: |
            Bootable HK1 Box (Amlogic S905X3) images built from mmdebstrap tarball + ophub kernel.

            | Distro | Suite | Kernel |
            |--------|-------|--------|
            | Debian | trixie | Latest kernel_stable |
            | Ubuntu | resolute | Latest kernel_stable |

            ### Flashing
            Use `balenaEtcher` / `dd` / `Amlogic USB Burning Tool` to flash `.img.gz` to SD card or USB disk.
